<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" font-family="'Yu Gothic','Meiryo','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
    <style>
      .box   { fill:#ffffff; stroke:#d1d5db; stroke-width:1.5; rx:14; }
      .title { font-size:17px; font-weight:700; fill:#262730; }
      .sub   { font-size:12.5px; fill:#6b7077; }
      .lab   { font-size:13px; font-weight:700; fill:#FF4B4B; letter-spacing:.04em; }
      .flow  { stroke:#9aa0a6; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .note  { font-size:12.5px; fill:#6b7077; }
    </style>
  </defs>

  <!-- card background -->
  <rect x="0" y="0" width="1040" height="470" rx="20" fill="#fbfbfc" stroke="#eceef1"/>

  <text x="40" y="46" class="title" font-size="22">🔍 仕組み — テキストでも画像でも、同じベクトル空間で検索</text>

  <!-- inputs -->
  <text x="60" y="120" class="lab">入力</text>
  <rect class="box" x="50" y="132" width="200" height="62" rx="14"/>
  <text x="70" y="160" class="title">テキスト</text>
  <text x="70" y="181" class="sub">"red dress" / 白い犬</text>

  <rect class="box" x="50" y="226" width="200" height="62" rx="14"/>
  <text x="70" y="254" class="title">クエリ画像</text>
  <text x="70" y="275" class="sub">手持ちの1枚をアップロード</text>

  <!-- CLIP encoder -->
  <text x="330" y="120" class="lab">埋め込み</text>
  <rect class="box" x="320" y="160" width="210" height="100" rx="14" fill="#fff5f5" stroke="#FF4B4B"/>
  <text x="345" y="200" class="title">CLIP エンコーダ</text>
  <text x="345" y="223" class="sub">open_clip / ViT-B-32</text>
  <text x="345" y="243" class="sub">画像とテキストを同一空間へ</text>

  <!-- vector -->
  <text x="610" y="120" class="lab">ベクトル</text>
  <rect class="box" x="600" y="160" width="160" height="100" rx="14"/>
  <text x="622" y="200" class="title">512次元</text>
  <text x="622" y="223" class="sub">L2正規化済み</text>
  <text x="622" y="243" class="sub">内積でcos類似度</text>

  <!-- FAISS -->
  <text x="840" y="120" class="lab">近傍検索</text>
  <rect class="box" x="830" y="160" width="170" height="100" rx="14" fill="#f3fbf8" stroke="#1D9E75"/>
  <text x="852" y="200" class="title">FAISS</text>
  <text x="852" y="223" class="sub">IndexFlatIP（内積）</text>
  <text x="852" y="243" class="sub">44,441枚から探索</text>

  <!-- results -->
  <rect class="box" x="830" y="300" width="170" height="58" rx="14"/>
  <text x="852" y="326" class="title">上位 K 件</text>
  <text x="852" y="346" class="sub">類似画像＋スコア</text>

  <!-- flows -->
  <path class="flow" d="M250,163 C285,163 285,200 318,205"/>
  <path class="flow" d="M250,257 C285,257 285,222 318,217"/>
  <path class="flow" d="M530,210 L598,210"/>
  <path class="flow" d="M760,210 L828,210"/>
  <path class="flow" d="M915,260 L915,298"/>

  <!-- build note -->
  <rect x="50" y="392" width="950" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="72" y="416" class="lab">事前準備</text>
  <text x="148" y="416" class="note">build_index.py が全画像をまとめてベクトル化し、FAISS インデックスを構築（最初の一度だけ）。</text>
  <text x="148" y="434" class="note">検索時はクエリだけをベクトル化すればよいので高速。CLIP の共通空間のおかげでテキストから画像をゼロショット検索できる。</text>
</svg>
