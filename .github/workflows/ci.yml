name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Light deps: indexer tests need only faiss + numpy, not CLIP/torch.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faiss-cpu numpy pytest

      - name: Run tests
        run: pytest -q
